# Smithery configuration for LetsFG MCP Server
# https://smithery.ai/docs/publishing

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      LETSFG_API_KEY:
        type: string
        description: "LetsFG API key (optional — local search works without it). Get one free: letsfg register --email you@example.com | letsfg.co"
      LETSFG_MAX_BROWSERS:
        type: string
        description: "Max concurrent browser instances for local search (1–32). Auto-detected from system RAM if not set."
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "letsfg-mcp"],
      env: {
        LETSFG_API_KEY: config.LETSFG_API_KEY || "",
        ...(config.LETSFG_MAX_BROWSERS && { LETSFG_MAX_BROWSERS: config.LETSFG_MAX_BROWSERS })
      }
    })
